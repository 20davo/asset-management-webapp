name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend CI - build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/AssetManagement

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        run: dotnet restore AssetManagement.sln

      - name: Build backend
        run: dotnet build AssetManagement.sln --configuration Release --no-restore

      - name: Test backend
        run: dotnet test AssetManagement.sln --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend CI - lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint -- --max-warnings=0

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Test frontend
        run: npm run test

      - name: Build frontend
        run: npm run build
