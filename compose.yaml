services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:5071/api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

  db:
    image: postgres:${POSTGRES_IMAGE_TAG:-16}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asset_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api/AssetManagement/AssetManagement.Api
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      DataProtection__KeysPath: /app/data-protection-keys
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-asset_management};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Key: ${JWT_KEY:?JWT_KEY must be set in the root .env file}
      Jwt__Issuer: ${JWT_ISSUER:-AssetManagement.Api}
      Jwt__Audience: ${JWT_AUDIENCE:-AssetManagement.Client}
      BootstrapAdmin__Enabled: ${BOOTSTRAP_ADMIN_ENABLED:-false}
      BootstrapAdmin__Name: ${BOOTSTRAP_ADMIN_NAME:-}
      BootstrapAdmin__Email: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BootstrapAdmin__Password: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN_0:-http://localhost:5173}
      Cors__AllowedOrigins__1: ${CORS_ALLOWED_ORIGIN_1:-https://localhost:5173}
    ports:
      - "${API_PORT:-5071}:8080"
    volumes:
      - api_data_protection_keys:/app/data-protection-keys
      - equipment_uploads:/app/wwwroot/uploads

volumes:
  api_data_protection_keys:
  postgres_data:
  equipment_uploads:
